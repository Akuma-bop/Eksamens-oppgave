<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oversikt</title>
     <link rel="stylesheet" href="/style.css">
     <script src="script.js" defer></script>
</head>
<body>
    
    <header>
        <h1>HopFiks</h1>
        <form action="/logout" method="post" style="display: inline;">
            <button type="submit" id="logoutBtn">Logg ut</button>
        </form>
    </header>

    <main>
    <button id="leggTilBtn" class="btn-leggtil">+ Legg til PC</button>
    
    <table id="pcTable">
        <tr>
            <th>ID</th>
            <th>Modell</th>
            <th>Status</th>
            <th>Tilstand</th>
            <th id="infoBtn">INFO</th>
            <th id="slettBtn">SLETT</th>
        </tr>
        <tbody id="data-table"></tbody>
    </table>

    <!-- Modal for å legge til ny PC -->
    <div id="modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Legg til ny PC</h2>
            <form id="formLeggTil">

                <label for="modell">Modell:</label>
                <input type="text" id="modell" name="modell" required>
                
                <label for="status">Status:</label>
                <input type="text" id="status" name="status" required>
                
                <label for="tilstand">Tilstand:</label>
                <input type="text" id="tilstand" name="tilstand" required>
                
                <button type="submit">Legg til</button>
            </form>
        </div>
    </div>    

    </main>

    <footer>
        <p>&copy; 2026 HopFiks. All rights reserved.</p>
    </footer>
</body>
</html>
